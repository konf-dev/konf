# Tools for the Genesis Kell.
#
# Genesis runs on the host metal (or bare VM) to manage infrastructure
# and other child kells.

tools:
  shell:
    container: host
    timeout_ms: 120000

  llm:
    provider: openai
    model: "${KONF_MODEL:-qwen3:8b}"

  secret:
    allowed_keys:
      - "OPENAI_API_KEY"
      - "GITHUB_TOKEN"
      - "STRIPE_SECRET_KEY"
      - "TAILSCALE_AUTHKEY"

  http:
    enabled: true

mcp_servers: {}
