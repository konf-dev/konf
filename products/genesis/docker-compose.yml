# Genesis production cell manifest
#
# This file defines the production environment for the CEO kell.
# It is executed on the VPS using Docker Compose.

services:
  # The Konf Brain (Genesis CEO)
  genesis:
    image: konf-dev/kernel:latest
    build:
      context: ../../..
      dockerfile: Dockerfile
    environment:
      - KONF_PRODUCT=genesis
      - INFISICAL_TOKEN=${INFISICAL_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      # Mount the product config into the container
      - .:/app/products/genesis
      # Mount the shared workspace
      - ../../../sandbox/workspace:/app/workspace
      # Mount Docker socket to allow Genesis to spawn other containers
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      infisical:
        condition: service_healthy

  # Memory Layer
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: konf
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Secret Vault
  infisical:
    image: infisical/infisical:latest
    environment:
      DB_URL: postgresql://postgres:${DB_PASSWORD:-secret}@postgres:5432/konf
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
