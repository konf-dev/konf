# System Pulse Workflow
#
# Generates a periodic report of the system's operational state
# and commits it to the repository.

workflow: system_pulse
description: "System status report: metrics, health, and available tools."
register_as_tool: true
capabilities: ["system:introspect", "log", "shell:exec", "ai:complete"]

nodes:
  - id: "gather_metrics"
    do: "system:introspect"
    with:
      scope: "tools"
    then: "analyze_health"

  - id: "analyze_health"
    do: "ai:complete"
    with:
      prompt: |
        Gathered System Data: {{gather_metrics}}
        
        Generate a concise System Status Report. 
        Format as Markdown with the following sections:
        ## 1. Operational Health
        ## 2. Infrastructure Metrics
        ## 3. Observations & Tools
      model: "${KONF_MODEL:-qwen3:8b}"
    then: "write_report"

  - id: "write_report"
    do: "shell:exec"
    with:
      command: |
        TIMESTAMP=$(date -Iseconds)
        REPORT_FILE="docs/reports/pulse-${TIMESTAMP}.md"
        mkdir -p docs/reports
        echo "{{analyze_health}}" > "$REPORT_FILE"
        git add docs/reports/
        git commit -m "pulse: system status report for ${TIMESTAMP}"
        git push origin master
    return: true
