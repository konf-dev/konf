# Kell Spawning (Mitosis) Workflow
#
# Genesis uses this workflow to create a new computational boundary (child kell)
# and provision it with a basic configuration.

workflow: spawn_kell
description: "Spawn a new child kell with its own configuration and workflows."
register_as_tool: true
capabilities: ["shell:exec", "ai:complete", "log"]

nodes:
  - id: "log_mitosis"
    do: "log"
    with:
      message: "Initiating mitosis: Spawning kell '{{input.name}}'..."
    then: "create_scaffold"

  - id: "create_scaffold"
    do: "shell:exec"
    with:
      command: |
        KELL_DIR="products/{{input.name}}.kell"
        mkdir -p "$KELL_DIR/config/workflows"
        mkdir -p "$KELL_DIR/prompts"
    then: "generate_dna"

  - id: "generate_dna"
    do: "ai:complete"
    with:
      prompt: |
        Create a Konf project.yaml for a child kell.
        Name: {{input.name}}
        Description: {{input.description}}
        Required Capabilities: {{input.capabilities}}
        
        Output ONLY valid YAML.
      model: "${KONF_MODEL:-qwen3:8b}"
    then: "write_dna"

  - id: "write_dna"
    do: "shell:exec"
    with:
      command: |
        KELL_DIR="products/{{input.name}}.kell"
        echo "{{generate_dna}}" > "$KELL_DIR/config/project.yaml"
        
        # Provision basic tools.yaml (Inherit minimal shell + LLM)
        cat <<INNEREOF > "$KELL_DIR/config/tools.yaml"
        tools:
          llm:
            provider: openai
            model: "\${KONF_MODEL:-qwen3:8b}"
          shell:
            container: konf-sandbox
            timeout_ms: 30000
        INNEREOF
        
        git add "$KELL_DIR"
        git commit -m "mitosis: spawn child kell '{{input.name}}'"
    return: true
