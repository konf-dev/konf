# Infrastructure Manifest for Genesis VPS
#
# These services are provisioned by the 'init' kell during the Phase 0 boot.

infrastructure:
  database:
    provider: "postgres"
    image: "postgres:16-alpine"
    ports: ["5432:5432"]
    volumes: ["./data/pg:/var/lib/postgresql/data"]
  
  secrets:
    provider: "infisical"
    image: "infisical/infisical:latest"
    ports: ["8080:8080"]
    depends_on: ["database"]

  compute:
    provider: "ollama"
    image: "ollama/ollama:latest"
    # Genesis uses cloud LLMs for reasoning, but child agents may use local models.
