# Genesis Kell (Generation 0) Project Configuration

name: genesis
description: "The cellular origin of the Konf OS ecosystem. CEO and Operational Membrane."
version: 0.1.0

# Genesis has root-level administrative access to manage the ecosystem.
roles:
  founder:
    capabilities: ["*"]
  admin:
    capabilities: ["*"]
  agent:
    capabilities:
      - "shell:exec"
      - "config:reload"
      - "secret:*"
      - "system:*"
      - "ai:complete"
      - "workflow:*"
      - "log"
