workflow: chat
description: "Search memory for context, then respond with LLM"
capabilities: ["memory:search", "memory:store", "ai:complete"]
nodes:
  search:
    do: memory:search
    input:
      query: "{{message}}"
    then: respond
  respond:
    do: ai:complete
    input:
      prompt: "{{message}}"
      context: "{{search.results}}"
    return: true
