# konf-prime-gemini — tools config.
#
# Variant: all-Gemini. Orchestration, reasoning, and tool-call loops
# all run against the Gemini API. Paid tier; requires GEMINI_API_KEY
# in the container env (see fleet-compose.yml).
#
# See models.yaml for the Gemini model catalog; ai:complete accepts
# per-call `provider` + `model` overrides so the agent can switch
# within the Gemini family per subtask.
#
# Thinking budgets (rig 0.34 supports ThinkingConfig with
# thinking_budget for Gemini 2.5 and thinking_level for Gemini 3) are
# NOT yet piped through ai:complete. To control reasoning depth
# explicitly, add the field to konf-tool-llm's CompletionConfig —
# that's a good first Rust patch for this agent to make.

tools:
  llm:
    provider: gemini
    model: "${KONF_MODEL:-gemini-2.5-pro}"
    temperature: 0.2
    max_tokens: 4096

  memory:
    backend: surreal
    config:
      mode: embedded
      path: /var/lib/konf/memory.db
      namespace: konf
      database: konf-prime-gemini
      vector_dimension: 768

  shell:
    container: "host"
    timeout_ms: 120000

  mcp_servers:
    mcp_servers:
      - name: filesystem
        transport: stdio
        command: npx
        args:
          - -y
          - "@modelcontextprotocol/server-filesystem"
          - /src
          - /etc/konf/products/konf-prime-gemini
        idle_timeout: 600
      - name: git
        transport: stdio
        command: npx
        args:
          - -y
          - "@modelcontextprotocol/server-git"
          - --repository
          - /src
        idle_timeout: 600
      - name: github
        transport: stdio
        command: docker
        args:
          - run
          - --rm
          - -i
          - -e
          - GITHUB_PERSONAL_ACCESS_TOKEN
          - ghcr.io/github/github-mcp-server
          - stdio
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: "${KONF_GITHUB_TOKEN}"
        idle_timeout: 600
      - name: fetch
        transport: stdio
        command: npx
        args:
          - -y
          - "@modelcontextprotocol/server-fetch"
        idle_timeout: 600
