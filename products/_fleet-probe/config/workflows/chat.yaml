# Phase 1 chat workflow — three substrate probes routed by input.message.
#
# Routing is exact-match on input.message because the konflux expression
# engine (executor.rs:736) evaluates a deliberately small subset: ==, !=,
# &&, ||, !, exists, is empty, dotted refs. No string methods, no slicing.
# So the prove-it-works strategy is "send a known control word":
#
#   POST /v1/chat {"message":"store"}       → memory:store the canary node
#   POST /v1/chat {"message":"search"}      → memory:search for the canary
#   POST /v1/chat {"message":"shell"}       → shell:exec benign whoami+uname
#   POST /v1/chat {"message":"shell-sudo"}  → shell:exec "sudo whoami" (must be guard-denied)
#   POST /v1/chat {"message":"shell-rm"}    → shell:exec "rm -rf /tmp/x" (must be guard-denied)
#   POST /v1/chat {"message":"<text>"}      → ai:complete (Phase 1 step 1 behavior)
#
# Cross-run persistence is proven by issuing `store` and `search` in two
# separate /v1/chat turns: each turn is a fresh root run, so a search hit
# in turn 2 means the embedded surreal backend on the probe_state volume
# survived between runs.

workflow: chat_router
description: "Routes /v1/chat to ai:complete OR memory:store/search probes by exact-match on input.message."
register_as_tool: false  # see STAGE_13 friction #12

capabilities:
  - "echo"
  - "ai:complete"
  - "memory:store"
  - "memory:search"
  - "shell:exec"

input_schema:
  type: object
  properties:
    message:
      type: string
  required: [message]

nodes:
  # Branch on the literal control word. Cheap echo gives the router a node
  # id to live on — branching attaches to a node, not to the workflow root.
  route:
    do: echo
    with:
      mode: "{{input.message}}"
    then:
      - when: "input.message == 'store'"
        then: store_canary
      - when: "input.message == 'search'"
        then: search_canary
      - when: "input.message == 'shell'"
        then: shell_ok
      - when: "input.message == 'shell-sudo'"
        then: shell_sudo
      - when: "input.message == 'shell-rm'"
        then: shell_rm
      - else: true
        then: llm_passthrough

  # Phase 1 step 2 — write a deterministic canary node into the embedded
  # surreal memory. Namespace is product-scoped so the search side knows
  # exactly where to look without depending on the chat handler's default
  # `konf:default:${user_id}` template.
  store_canary:
    do: memory:store
    with:
      namespace: "konf:fleet-probe:phase1-step2"
      nodes:
        - content: "phase1-step2 canary alpha-bravo-charlie-delta"
          node_type: "memory"
          metadata:
            origin: "fleet-probe"
            phase: "1.2"
            tag: "canary"
    return: true

  # Phase 1 step 2 — text search for the canary. Uses surreal's "text"
  # mode (no embedding model needed). A non-empty hit list in turn 2
  # proves the data survived the first run.
  search_canary:
    do: memory:search
    with:
      namespace: "konf:fleet-probe:phase1-step2"
      query: "alpha-bravo-charlie-delta"
      mode: "text"
      limit: 5
    return: true

  # Phase 1 step 3 + step 4 — happy path with output-based when: branching.
  # shell_ok runs a benign command; the `then:` block routes on the node's
  # own exit_code, exercising `when:` over a previous node's output (not
  # just over input.message). Both branches end at echo nodes that emit
  # structured summaries — proving outputs flow into downstream `with:`.
  shell_ok:
    do: shell:exec
    with:
      command: "whoami && uname -srm && pwd"
    then:
      - when: "shell_ok.exit_code == 0"
        then: shell_ok_succ
      - else: true
        then: shell_ok_fail

  shell_ok_succ:
    do: echo
    with:
      ok: true
      exit_code: "{{shell_ok.exit_code}}"
      stdout: "{{shell_ok.stdout}}"
    return: true

  shell_ok_fail:
    do: echo
    with:
      ok: false
      exit_code: "{{shell_ok.exit_code}}"
      stderr: "{{shell_ok.stderr}}"
    return: true

  # Phase 1 step 3 + step 4 — guard denial converted into a graceful
  # `done` event via `catch:`. Without catch, the SSE stream would emit
  # a top-level `error` event and the run would terminate with no usable
  # output. With catch, the failing node's error routes to a recovery
  # echo that returns a structured "denied" payload. Note: the failing
  # node's own output is NOT set (executor.rs:432–464 ErrorAction::Goto
  # only jumps; it does not stash the error in outputs), so the recovery
  # node can only emit a static description of what was blocked. This is
  # why we use one recovery node per blocked route, not a shared one.
  shell_sudo:
    do: shell:exec
    with:
      command: "sudo whoami"
    catch: denied_sudo
    return: true  # only reached on the impossible-success path

  denied_sudo:
    do: echo
    with:
      denied: true
      blocked_rule: "contains:sudo"
      attempted: "sudo whoami"
      note: "caught by chat_router.shell_sudo.catch — guard fired at dispatch"
    return: true

  shell_rm:
    do: shell:exec
    with:
      command: "rm -rf /tmp/konf-fleet-probe-canary"
    catch: denied_rm
    return: true

  denied_rm:
    do: echo
    with:
      denied: true
      blocked_rule: "matches:rm -rf*"
      attempted: "rm -rf /tmp/konf-fleet-probe-canary"
      note: "caught by chat_router.shell_rm.catch — guard fired at dispatch"
    return: true

  # Phase 1 step 1 fallback — anything that's not a control word goes to
  # the LLM, preserving the existing /v1/chat conversational behavior.
  llm_passthrough:
    do: ai:complete
    with:
      prompt: "{{input.message}}"
      max_tokens: 64
      temperature: 0
    return: true
