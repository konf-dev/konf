# The init product — reference example
#
# Provisions external infrastructure (Postgres, Infisical, etc.) via
# `shell:exec` calls before other products run. Not a special type —
# just a convention documented in konf/docs/MENTAL_MODEL.md.

name: init
description: "Konf OS Infrastructure Bootstrap"
version: 0.1.0

# Define a root admin role that only the init process uses.
roles:
  admin:
    capabilities: ["*"]
