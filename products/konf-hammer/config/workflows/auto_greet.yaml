workflow: auto_greet
description: "Accept an input string named 'name' and echo back 'Hello, <name>!' using the echo substrate primitive. Return the greeting text."
version: "0.1.0"
register_as_tool: true

capabilities:
  - "echo"

input_schema:
  type: object
  properties:
    name:
      type: string
      description: "The name to greet."
  required: [name]

nodes:
  greet:
    do: echo
    with:
      message: "Hello, {{input.name}}!"
    return: true

