# Slice 3+4: draft a workflow YAML from NL description, validate it,
# attempt one repair pass if validation fails.
#
# NO writes in this slice. The draft + validation status are returned as
# text for inspection. Slice 5 adds write + hot-reload.

workflow: draft_workflow
description: "Draft a workflow YAML for a target product, validate it, retry once on failure. Returns YAML text + status, no writes."
version: "0.2.0"
register_as_tool: true

capabilities:
  - "ai:complete"
  - "shell:exec"
  - "template"
  - "echo"
  - "yaml:validate_workflow"

input_schema:
  type: object
  properties:
    target_product_dir:
      type: string
      description: "Absolute path to the target product's root directory (e.g. /home/bert/Work/orgs/konf-dev-stack/konf/products/repo-manager)."
    description:
      type: string
      description: "Plain-English description of what the workflow should do."
    slug:
      type: string
      description: "Short snake_case identifier — becomes the filename 'auto_<slug>.yaml' and the workflow: 'auto_<slug>' header."
  required: [target_product_dir, description, slug]

nodes:
  # Gather style context: target's authoring prompt + every existing workflow.
  gather_context:
    do: shell:exec
    with:
      command: |
        dir="{{input.target_product_dir}}"
        if [ ! -d "$dir" ]; then
          printf 'ERROR: target dir not found: %s\n' "$dir"
          exit 1
        fi
        printf '## Target product authoring prompt (style anchor)\n\n'
        if [ -f "$dir/prompts/system.md" ]; then
          cat "$dir/prompts/system.md"
        else
          printf '(no prompts/system.md)\n'
        fi
        printf '\n## Existing workflows in this target (style samples)\n'
        wfdir="$dir/config/workflows"
        if [ -d "$wfdir" ]; then
          found=0
          for f in "$wfdir"/*.yaml; do
            [ -f "$f" ] || continue
            found=1
            printf '\n### %s\n\n```yaml\n' "$(basename "$f")"
            cat "$f"
            printf '\n```\n'
          done
          [ "$found" -eq 0 ] && printf '(no existing workflows)\n'
        else
          printf '(no config/workflows dir)\n'
        fi
    timeout: "10s"
    then: draft

  # Ask the LLM to draft the YAML.
  draft:
    do: ai:complete
    with:
      system: |
        You draft konf workflow YAML. Output EXACTLY one complete YAML document —
        the file body — and nothing else. No markdown fences. No prose.

        Mandatory rules:
        - First line must be `workflow: auto_<slug>` using the slug provided.
        - `capabilities:` must be an explicit list. Never use "*".
        - Never grant `config:reload` or `yaml:validate_workflow` to drafted
          workflows. Those are meta-tools reserved for hand-authored ones.
        - Every node has `id`, `do`, and `with`. Optional: `then`, `catch`,
          `join`, `return`, `when`, `timeout`.
        - Mark exactly one terminal node with `return: true`.
        - `register_as_tool: true` at top level if the caller will invoke it
          as an MCP tool; omit otherwise.

        Substrate primitives (use these for `do:`):
          echo, template, shell:exec, ai:complete,
          memory:search, memory:store,
          state:set, state:get, state:delete, state:list, state:clear,
          http:get, http:post,
          runner:spawn, runner:status, runner:wait, runner:cancel.

        Template rules (the `template` primitive):
        - Both `template:` and `vars:` are required in `with:`. Empty
          `vars: {}` is fine but the key must be present.
        - Interpolation uses double curly braces around NODE_ID.FIELD
          (e.g. the stdout of a shell node called `probe` is referenced as
          double-open-brace probe.stdout double-close-brace). Emit actual
          mustache syntax in your output — do not emit the descriptive text.

        ai:complete returns `.text`, not `.content`.

        `when:` is a bare expression, NOT wrapped in mustache braces.

        Prefer small, flat DAGs. Use `then:` for sequencing and `join:` only
        when fanning multiple nodes into one sink.

        Output the YAML file body only. Begin immediately with the
        `workflow:` line.
      prompt: |
        Draft a konf workflow that does the following:

        {{input.description}}

        ## File identity
        - target_product_dir: {{input.target_product_dir}}
        - filename: {{input.target_product_dir}}/config/workflows/auto_{{input.slug}}.yaml
        - required header: `workflow: auto_{{input.slug}}`

        ## Style context from the target product

        {{gather_context.stdout}}
      max_tokens: 3072
      temperature: 0.2
    then: validate

  # Validate the draft against the konf kernel schema + tool references.
  # yaml:validate_workflow returns {valid: bool, errors: []} — it does NOT
  # throw on invalid YAML, so branch on `.valid` via `when:` rather than
  # relying on `catch:`.
  validate:
    do: yaml:validate_workflow
    with:
      yaml: "{{draft.text}}"
    then:
      - when: "validate.valid == true"
        then: success_v1
      - else: true
        then: repair

  # One repair attempt — feed the invalid draft + validator error back.
  repair:
    do: ai:complete
    with:
      system: |
        You are fixing a konf workflow YAML that failed validation. Output
        EXACTLY one complete corrected YAML document. No markdown fences.
        No prose. Begin with the `workflow:` line.

        Apply the same mandatory rules as a fresh draft:
        - explicit `capabilities:` list, never "*"
        - no `config:reload` or `yaml:validate_workflow` capabilities
        - every node has id/do/with; exactly one terminal node has `return: true`
        - template nodes require both `template:` and `vars:`
        - interpolate with double curly braces around NODE_ID.FIELD
        - substrate primitives only: echo, template, shell:exec, ai:complete,
          memory:*, state:*, http:get, http:post, runner:*

        Fix what the validator flagged. Keep everything else intact.
      prompt: |
        ## Previous draft (failed validation)

        {{draft.text}}

        ## Validator error

        {{validate}}

        Emit the corrected YAML file body now.
      max_tokens: 3072
      temperature: 0.1
    then: validate_repair

  # Re-validate after repair.
  validate_repair:
    do: yaml:validate_workflow
    with:
      yaml: "{{repair.text}}"
    then:
      - when: "validate_repair.valid == true"
        then: success_v2
      - else: true
        then: failed

  # Terminal — first draft was valid.
  #
  # Why shell:exec and not template: konf's `template` tool double-renders
  # (inputs are template-resolved, then the tool renders the template again).
  # Drafted YAML contains its own `{{...}}` references which the second pass
  # tries to expand against this workflow's vars, producing undefined errors.
  # shell:exec's command is rendered once; stdout is not re-rendered.
  success_v1:
    do: shell:exec
    with:
      command: |
        cat <<'__KONF_HAMMER_RESULT__'
        status: ok
        attempts: 1
        slug: {{input.slug}}
        target_path: {{input.target_product_dir}}/config/workflows/auto_{{input.slug}}.yaml

        ---yaml---
        {{draft.text}}
        __KONF_HAMMER_RESULT__
    timeout: "5s"
    return: true

  # Terminal — repair succeeded on the second attempt.
  success_v2:
    do: shell:exec
    with:
      command: |
        cat <<'__KONF_HAMMER_RESULT__'
        status: ok
        attempts: 2
        slug: {{input.slug}}
        target_path: {{input.target_product_dir}}/config/workflows/auto_{{input.slug}}.yaml

        ---yaml---
        {{repair.text}}
        __KONF_HAMMER_RESULT__
    timeout: "5s"
    return: true

  # Terminal — still invalid after one repair. Caller can retry with a
  # different description or accept the last draft as a starting point.
  failed:
    do: shell:exec
    with:
      command: |
        cat <<'__KONF_HAMMER_RESULT__'
        status: failed
        attempts: 2
        slug: {{input.slug}}

        ---last_draft---
        {{repair.text}}
        __KONF_HAMMER_RESULT__
    timeout: "5s"
    return: true
