# konf-prime-hybrid — tools config.
#
# Variant: Gemini for orchestration + Ollama for bulk tool loops.
# Both providers are reachable: set OLLAMA_API_BASE_URL to the small-GPU
# ollama endpoint (port 11435 / RTX 2070S) in fleet-compose.yml, pass
# GEMINI_API_KEY for the cloud side.
#
# Default provider is ollama (cheap bulk). The agent overrides
# `provider: gemini` + `model: gemini-2.5-pro` in ai:complete calls
# where the orchestration reasoning justifies the cloud cost.
#
# See models.yaml for the catalog. The agent's own `chat.yaml`
# agent_llm node can be edited to switch its default provider per turn
# (e.g. orchestration via gemini, sub-agent workflows via ollama).
#
# Thinking/reasoning pass-through is NOT yet wired; see comment in
# konf-prime-gemini/config/tools.yaml.

tools:
  llm:
    provider: ollama
    model: "${KONF_MODEL:-gemma4:e4b}"
    temperature: 0.2
    max_tokens: 2048

  memory:
    backend: surreal
    config:
      mode: embedded
      path: /var/lib/konf/memory.db
      namespace: konf
      database: konf-prime-hybrid
      vector_dimension: 768

  shell:
    container: "host"
    timeout_ms: 120000

  mcp_servers:
    mcp_servers:
      - name: filesystem
        transport: stdio
        command: npx
        args:
          - -y
          - "@modelcontextprotocol/server-filesystem"
          - /src
          - /etc/konf/products/konf-prime-hybrid
        idle_timeout: 600
      - name: git
        transport: stdio
        command: npx
        args:
          - -y
          - "@modelcontextprotocol/server-git"
          - --repository
          - /src
        idle_timeout: 600
      - name: github
        transport: stdio
        command: docker
        args:
          - run
          - --rm
          - -i
          - -e
          - GITHUB_PERSONAL_ACCESS_TOKEN
          - ghcr.io/github/github-mcp-server
          - stdio
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: "${KONF_GITHUB_TOKEN}"
        idle_timeout: 600
      - name: fetch
        transport: stdio
        command: npx
        args:
          - -y
          - "@modelcontextprotocol/server-fetch"
        idle_timeout: 600
