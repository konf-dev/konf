# Minimal tmux config for the repo-manager sandbox.

# 256-color + true-color so claude-cli renders nicely.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Big scrollback so long cargo outputs stay viewable.
set -g history-limit 50000

# Faster escape — matters for claude-cli's keybindings.
set -sg escape-time 10

# Start windows and panes at 1.
set -g base-index 1
setw -g pane-base-index 1

# Useful mouse support (scroll, pane-switch on click).
set -g mouse on

# Status line: simple, shows hostname so you remember you're inside the
# sandbox.
set -g status-right "#[fg=cyan]konf-sandbox#[default] | %H:%M"
