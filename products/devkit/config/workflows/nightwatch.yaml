workflow: nightwatch
description: "Self-sustaining health check agent. Runs dev_status, logs results, reschedules itself. Stop by creating /tmp/nightwatch/stop sentinel file."
register_as_tool: true
capabilities: ["shell_exec", "template", "echo", "schedule", "workflow_dev_status"]
input_schema:
  type: object
  properties:
    interval_ms:
      type: integer
      description: "Milliseconds between runs (default: 3600000 = 1 hour, min: 1000)"
nodes:
  check_stop:
    do: shell_exec
    with:
      command: "test -f /tmp/nightwatch/stop && echo 'STOPPED' || echo 'RUNNING'"
    then: decide
  decide:
    do: template
    with:
      template: "{{check_stop.stdout}}"
    condition: "{{check_stop.stdout != 'STOPPED'}}"
    then: health_check
  health_check:
    do: workflow_dev_status
    then: log_result
    catch: log_error
  log_result:
    do: shell_exec
    with:
      command: |
        mkdir -p /tmp/nightwatch
        echo "[$(date -Iseconds)] OK" >> /tmp/nightwatch/health.log
        tail -20 /tmp/nightwatch/health.log
    then: reschedule
  log_error:
    do: shell_exec
    with:
      command: |
        mkdir -p /tmp/nightwatch
        echo "[$(date -Iseconds)] ERROR" >> /tmp/nightwatch/health.log
    then: reschedule
  reschedule:
    do: schedule
    with:
      workflow: nightwatch
      delay_ms: "{{input.interval_ms}}"
      input:
        interval_ms: "{{input.interval_ms}}"
    return: true
