workflow: nightwatch
description: "Health check agent. Runs dev_status and logs the result. Use schedule tool with repeat:true to run periodically."
register_as_tool: true
capabilities: ["shell:exec", "workflow:dev_status"]
nodes:
  health_check:
    do: workflow:dev_status
    then: log_result
  log_result:
    do: shell:exec
    with:
      command: "mkdir -p /tmp/nightwatch && echo \"[$(date -Iseconds)] OK\" >> /tmp/nightwatch/health.log && tail -5 /tmp/nightwatch/health.log"
    return: true
