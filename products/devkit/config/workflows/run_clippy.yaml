workflow: run_clippy
description: "Run cargo clippy across konf workspace, report warnings"
register_as_tool: true
capabilities: ["*"]
input_schema:
  type: object
  properties: {}
nodes:
  clippy:
    do: shell_exec
    with:
      command: "cd ${KONF_WORKSPACE}/konf && cargo clippy --workspace -- -D warnings 2>&1 | tail -5"
    then: report
  report:
    do: template
    with:
      template: "# Clippy Results\n\n{{clippy.stdout}}\n{{clippy.stderr}}"
    return: true
