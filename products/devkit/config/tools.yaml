tools:
  llm:
    provider: openai
    model: "${KONF_MODEL:-qwen3:8b}"
  shell:
    container: "host"
    timeout_ms: 120000
  mcp_servers:
    mcp_servers:
      - name: github
        transport: stdio
        command: docker
        args:
          - run
          - --rm
          - -i
          - -e
          - GITHUB_PERSONAL_ACCESS_TOKEN
          - ghcr.io/github/github-mcp-server
          - stdio
          - --toolsets
          - repos,pull_requests,git
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: "${KONF_GITHUB_TOKEN}"

# Tool guards for autonomous execution (Experiment 004)
tool_guards:
  shell:exec:
    rules:
      - action: deny
        predicate:
          type: contains
          path: command
          value: "sudo"
        message: "sudo blocked in autonomous mode"
      - action: deny
        predicate:
          type: matches
          path: command
          pattern: "rm -rf /*"
        message: "destructive rm on root paths blocked"
    default: allow

# Role definitions for scoped execution
roles:
  admin:
    capabilities: ["*"]
  agent:
    capabilities: ["shell:exec", "template", "echo", "log", "schedule:*", "config:reload", "ai:complete", "yaml:validate_workflow", "workflow:*"]
    namespace_suffix: "nightwatch"
