name: Security Audit

on:
  push:
    branches: [main]
    paths: ['**/Cargo.toml', '**/Cargo.lock']
  schedule:
    - cron: '0 6 * * *'

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
