name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  check-and-test:
    name: Check, Clippy, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Stub private smrti dependency
        run: ./scripts/stub-smrti.sh

      # Build and test each crate individually to avoid memory-smrti SSH dep
      # (smrti is a private external repo — needs SSH keys not available in CI)
      - name: Check workspace (no memory-smrti)
        run: |
          # Test each crate that doesn't need external deps
          for crate in konflux-core konf-runtime konf-tool-http konf-tool-llm \
                       konf-tool-embed konf-tool-mcp konf-tool-memory \
                       konf-tool-secret konf-tool-shell konf-mcp; do
            echo "::group::Check $crate"
            cargo clippy -p "$crate" --all-targets -- -D warnings
            cargo test -p "$crate"
            echo "::endgroup::"
          done

      - name: Check konf-init (without memory-smrti)
        run: |
          cargo clippy -p konf-init --no-default-features --features postgres --all-targets -- -D warnings
          cargo test -p konf-init --no-default-features --features postgres

      - name: Check konf-backend
        run: |
          cargo clippy -p konf-backend --all-targets -- -D warnings
          cargo test -p konf-backend

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [fmt, check-and-test]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Stub private smrti dependency
        run: ./scripts/stub-smrti.sh
      - name: Build binaries
        run: |
          cargo build -p konf-init --no-default-features --features postgres --release
          cargo build --bin konf-backend --release
          cargo build --bin konf-mcp --release

  validate-products:
    name: Validate Products
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: pip3 install PyYAML
      - name: Validate product configs are valid YAML
        run: |
          for f in $(find products -name '*.yaml' -o -name '*.yml'); do
            echo "Validating $f"
            python3 -c "import yaml; yaml.safe_load(open('$f'))"
          done

  deny:
    name: Deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Stub private smrti dependency
        run: ./scripts/stub-smrti.sh
      - uses: EmbarkStudios/cargo-deny-action@v2
