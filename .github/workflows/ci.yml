name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  check-and-test:
    name: Check, Clippy, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Stub optional smrti dependency
        run: ./scripts/stub-smrti.sh

      - name: Clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (workspace)
        run: cargo test --workspace

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [fmt, check-and-test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Stub optional smrti dependency
        run: ./scripts/stub-smrti.sh
      - name: Build binaries
        run: |
          cargo build --bin konf-backend --release
          cargo build --bin konf-mcp --release

  validate-products:
    name: Validate Products
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate product configs are valid YAML
        run: |
          for f in $(find products -name '*.yaml' -o -name '*.yml' 2>/dev/null); do
            echo "Validating $f"
            python3 -c "import yaml; yaml.safe_load(open('$f'))"
          done

  deny:
    name: Deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stub optional smrti dependency
        run: ./scripts/stub-smrti.sh
      - uses: EmbarkStudios/cargo-deny-action@v2
