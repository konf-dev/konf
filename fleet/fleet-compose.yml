# konf fleet — one container per product.
#
# Phase 0: single `_fleet-probe` service. Proves the container boots,
# /v1/health responds, and the monitor stream opens.
#
# As real products land, add them as sibling services. Each gets:
#   - its own volume for redb + memory.db (state isolation)
#   - its own port (explicit, no dynamic allocation)
#   - its own product config dir (read-only bind mount)
#
# Not using the root konf/docker-compose.yml — that still assumes
# Postgres + Supabase from the pre-redb architecture.

services:
  probe:
    image: konf-backend:phase0
    container_name: konf-fleet-probe
    environment:
      KONF_CONFIG_DIR: /etc/konf/products/_fleet-probe/config
      KONF_DEV_MODE: "1"  # bypass JWT — sandbox only, never network-exposed
      RUST_LOG: "info,konf=debug"
      # Phase 1 step 1: reach host Ollama from inside the container.
      # `host.docker.internal` is mapped via extra_hosts below; rig's ollama
      # provider reads this base URL when the env var is set.
      OLLAMA_API_BASE_URL: "http://host.docker.internal:11434"
      # Optional: pin a specific model. Falls back to qwen3:8b in tools.yaml.
      KONF_MODEL: "${KONF_MODEL:-qwen3:8b}"
    extra_hosts:
      # Linux Docker doesn't auto-resolve host.docker.internal — map it
      # to the host gateway so the container can reach host services.
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      # Product config: read-only, so a misbehaving container can't trash it.
      - ../products/_fleet-probe/config:/etc/konf/products/_fleet-probe/config:ro
      # State volume: redb journal + surreal memory live here.
      - probe_state:/var/lib/konf
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Phase 1 anchor workload — see ../products/code-audit/README.md.
  # Sibling container, separate state volume, source bind-mounted
  # read-only so the workflow can read .rs files without reaching the
  # host through any mutating path.
  audit:
    image: konf-backend:phase0
    container_name: konf-code-audit
    environment:
      KONF_CONFIG_DIR: /etc/konf/products/code-audit/config
      KONF_DEV_MODE: "1"
      RUST_LOG: "info,konf=debug"
      OLLAMA_API_BASE_URL: "http://host.docker.internal:11434"
      KONF_MODEL: "${KONF_MODEL:-qwen3-coder:30b}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8000"
    volumes:
      - ../products/code-audit/config:/etc/konf/products/code-audit/config:ro
      # Source mount — read-only. Pointed at the konf source tree so the
      # audit workflow can `cat` files without any write capability.
      - ..:/audit-target:ro
      - audit_state:/var/lib/konf
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  probe_state:
  audit_state:
