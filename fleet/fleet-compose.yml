# konf fleet — one container per product.
#
# Phase 0: single `_fleet-probe` service. Proves the container boots,
# /v1/health responds, and the monitor stream opens.
#
# As real products land, add them as sibling services. Each gets:
#   - its own volume for redb + memory.db (state isolation)
#   - its own port (explicit, no dynamic allocation)
#   - its own product config dir (read-only bind mount)
#
# Not using the root konf/docker-compose.yml — that still assumes
# Postgres + Supabase from the pre-redb architecture.

services:
  probe:
    image: konf-backend:phase0
    container_name: konf-fleet-probe
    environment:
      KONF_CONFIG_DIR: /etc/konf/products/_fleet-probe/config
      KONF_DEV_MODE: "1"  # bypass JWT — sandbox only, never network-exposed
      RUST_LOG: "info,konf=debug"
      # Phase 1 step 1: reach host Ollama from inside the container.
      # `host.docker.internal` is mapped via extra_hosts below; rig's ollama
      # provider reads this base URL when the env var is set.
      OLLAMA_API_BASE_URL: "http://host.docker.internal:11434"
      # Optional: pin a specific model. Falls back to qwen3:8b in tools.yaml.
      KONF_MODEL: "${KONF_MODEL:-qwen3:8b}"
    extra_hosts:
      # Linux Docker doesn't auto-resolve host.docker.internal — map it
      # to the host gateway so the container can reach host services.
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      # Product config: read-only, so a misbehaving container can't trash it.
      - ../products/_fleet-probe/config:/etc/konf/products/_fleet-probe/config:ro
      # State volume: redb journal + surreal memory live here.
      - probe_state:/var/lib/konf
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Phase 1 anchor workload — see ../products/code-audit/README.md.
  # Sibling container, separate state volume, source bind-mounted
  # read-only so the workflow can read .rs files without reaching the
  # host through any mutating path.
  audit:
    image: konf-backend:phase0
    container_name: konf-code-audit
    environment:
      KONF_CONFIG_DIR: /etc/konf/products/code-audit/config
      KONF_DEV_MODE: "1"
      RUST_LOG: "info,konf=debug"
      OLLAMA_API_BASE_URL: "http://host.docker.internal:11434"
      KONF_MODEL: "${KONF_MODEL:-qwen3-coder:30b}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8000"
    volumes:
      - ../products/code-audit/config:/etc/konf/products/code-audit/config:ro
      # Source mount — read-only. Pointed at the konf source tree so the
      # audit workflow can `cat` files without any write capability.
      - ..:/audit-target:ro
      - audit_state:/var/lib/konf
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Sovereign agent — ollama variant. See ../products/konf-prime/README.md.
  # The product config dir is mounted WRITABLE so the agent edits its own
  # workflows/prompts/tools and calls config:reload. The /src volume is
  # the agent's own git clone (not the host working tree). Docker socket
  # lets the agent rebuild + restart itself. No tool guards; the container
  # boundary is the safety boundary.
  prime:
    image: konf-backend:phase0
    container_name: konf-prime
    environment:
      KONF_CONFIG_DIR: /etc/konf/products/konf-prime/config
      KONF_DEV_MODE: "1"
      RUST_LOG: "info,konf=debug"
      # Big-GPU ollama endpoint (RTX 3090 Ti, port 11434).
      OLLAMA_API_BASE_URL: "http://host.docker.internal:11434"
      KONF_MODEL: "${KONF_MODEL:-qwen3-coder:30b}"
      KONF_GITHUB_TOKEN: "${KONF_GITHUB_TOKEN:-}"
      KONF_PRIME_GIT_REMOTE: "${KONF_PRIME_GIT_REMOTE:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8002:8000"
    volumes:
      - ../products/konf-prime/config:/etc/konf/products/konf-prime/config:rw
      - prime_src:/src:rw
      - /var/run/docker.sock:/var/run/docker.sock
      - prime_state:/var/lib/konf
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # All-Gemini variant. Paid tier; requires GEMINI_API_KEY in host env.
  prime-gemini:
    image: konf-backend:phase0
    container_name: konf-prime-gemini
    environment:
      KONF_CONFIG_DIR: /etc/konf/products/konf-prime-gemini/config
      KONF_DEV_MODE: "1"
      RUST_LOG: "info,konf=debug"
      GEMINI_API_KEY: "${GEMINI_API_KEY:?set GEMINI_API_KEY in your shell before starting this variant}"
      KONF_MODEL: "${KONF_GEMINI_MODEL:-gemini-2.5-pro}"
      KONF_GITHUB_TOKEN: "${KONF_GITHUB_TOKEN:-}"
      KONF_PRIME_GIT_REMOTE: "${KONF_PRIME_GIT_REMOTE:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8003:8000"
    volumes:
      - ../products/konf-prime-gemini/config:/etc/konf/products/konf-prime-gemini/config:rw
      - prime_gemini_src:/src:rw
      - /var/run/docker.sock:/var/run/docker.sock
      - prime_gemini_state:/var/lib/konf
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Hybrid: Gemini for orchestration + Ollama (small GPU) for bulk.
  # Default provider is ollama; agent overrides to gemini per ai:complete
  # call for the hardest reasoning.
  prime-hybrid:
    image: konf-backend:phase0
    container_name: konf-prime-hybrid
    environment:
      KONF_CONFIG_DIR: /etc/konf/products/konf-prime-hybrid/config
      KONF_DEV_MODE: "1"
      RUST_LOG: "info,konf=debug"
      # Small-GPU ollama endpoint (RTX 2070 Super, port 11435).
      OLLAMA_API_BASE_URL: "http://host.docker.internal:11435"
      GEMINI_API_KEY: "${GEMINI_API_KEY:?set GEMINI_API_KEY in your shell before starting this variant}"
      KONF_MODEL: "${KONF_HYBRID_MODEL:-gemma4:e4b}"
      KONF_GITHUB_TOKEN: "${KONF_GITHUB_TOKEN:-}"
      KONF_PRIME_GIT_REMOTE: "${KONF_PRIME_GIT_REMOTE:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8004:8000"
    volumes:
      - ../products/konf-prime-hybrid/config:/etc/konf/products/konf-prime-hybrid/config:rw
      - prime_hybrid_src:/src:rw
      - /var/run/docker.sock:/var/run/docker.sock
      - prime_hybrid_state:/var/lib/konf
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  probe_state:
  audit_state:
  prime_state:
  prime_src:
  prime_gemini_state:
  prime_gemini_src:
  prime_hybrid_state:
  prime_hybrid_src:
