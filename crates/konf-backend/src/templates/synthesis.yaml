workflow: synthesis
nodes:
  search_done:
    do: memory_search
    with:
      query: "completed items"
      node_type: "action"
      limit: 50
    then: analyze

  analyze:
    do: ai_complete
    with:
      system: "You are a graph maintenance system. Identify nodes that should be archived (done > 7 days), merged (duplicates with cosine similarity > 0.85), or have edges decayed."
      prompt: "{{ search_done }}"
    return: true
